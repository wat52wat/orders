<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Мои заказы</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --accent: #ff6b35;
    --accent2: #ff9f1c;
    --green: #2ecc71;
    --red: #e74c3c;
    --yellow: #f39c12;
    --text: #f0f0f5;
    --text2: #8888aa;
    --border: rgba(255,255,255,0.07);
    --radius: 18px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Golos Text', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== ШАПКА ===== */
  .header {
    padding: 20px 20px 0;
    position: relative;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .logo {
    font-family: 'Unbounded', sans-serif;
    font-size: 18px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-sub {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 20px;
  }

  /* ===== ТАБЫ ===== */
  .tabs {
    display: flex;
    background: var(--surface);
    border-radius: 14px;
    padding: 4px;
    margin: 0 20px 20px;
    gap: 4px;
  }
  .tab {
    flex: 1;
    padding: 10px 6px;
    border: none;
    background: transparent;
    color: var(--text2);
    font-family: 'Golos Text', sans-serif;
    font-size: 12px;
    font-weight: 600;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .tab.active {
    background: var(--surface2);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .tab-count {
    display: inline-block;
    background: var(--accent);
    color: white;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 20px;
    margin-left: 4px;
    font-weight: 700;
  }

  /* ===== СТРАНИЦЫ ===== */
  .page { display: none; padding: 0 20px 100px; }
  .page.active { display: block; }

  /* ===== КАРТОЧКА ЗАКАЗА ===== */
  .order-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .order-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
  }
  .order-card.status-ok::before { background: var(--green); }
  .order-card.status-today::before { background: var(--accent); }
  .order-card.status-overdue::before { background: var(--red); }
  .order-card.status-done::before { background: var(--text2); }

  .order-name {
    font-family: 'Unbounded', sans-serif;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 12px;
    padding-right: 80px;
    line-height: 1.4;
  }
  .order-badge {
    position: absolute;
    top: 16px; right: 16px;
    font-size: 10px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .badge-ok { background: rgba(46,204,113,0.15); color: var(--green); }
  .badge-today { background: rgba(255,107,53,0.15); color: var(--accent); }
  .badge-overdue { background: rgba(231,76,60,0.15); color: var(--red); }
  .badge-done { background: rgba(136,136,170,0.1); color: var(--text2); }

  .order-details {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
  }
  .detail-item {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
  }
  .detail-label {
    font-size: 10px;
    color: var(--text2);
    margin-bottom: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .detail-value {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    word-break: break-word;
  }
  .detail-item.full { grid-column: 1 / -1; }

  .order-actions {
    display: flex;
    gap: 8px;
  }
  .btn {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Golos Text', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    active-transform: scale(0.97);
  }
  .btn:active { transform: scale(0.97); }
  .btn-complete {
    background: linear-gradient(135deg, var(--green), #27ae60);
    color: white;
  }
  .btn-delete {
    background: var(--surface2);
    color: var(--text2);
    flex: 0;
    padding: 10px 14px;
  }

  /* ===== ПУСТОЙ СПИСОК ===== */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
  }
  .empty-icon {
    font-size: 56px;
    margin-bottom: 16px;
    display: block;
  }
  .empty-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text);
  }
  .empty-sub { font-size: 14px; color: var(--text2); line-height: 1.5; }

  /* ===== FAB КНОПКА ===== */
  .fab {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    border-radius: 50px;
    padding: 16px 32px;
    font-family: 'Unbounded', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(255,107,53,0.4);
    transition: all 0.2s;
    white-space: nowrap;
    z-index: 100;
  }
  .fab:active { transform: translateX(-50%) scale(0.97); }
  .fab.hidden { display: none; }

  /* ===== МОДАЛЬНОЕ ОКНО ДОБАВЛЕНИЯ ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; align-items: flex-end; }
  .modal {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .modal-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 24px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }
  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 13px 14px;
    color: var(--text);
    font-family: 'Golos Text', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--text2); }

  .payment-options {
    display: flex;
    gap: 8px;
  }
  .pay-opt {
    flex: 1;
    padding: 12px 8px;
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text2);
    font-family: 'Golos Text', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  .pay-opt.selected {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(255,107,53,0.1);
  }

  .btn-submit {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Unbounded', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
  }
  .btn-submit:active { transform: scale(0.98); }

  /* ===== ТОСТ ===== */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--surface2);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 500;
    z-index: 999;
    transition: transform 0.3s ease;
    white-space: nowrap;
    border: 1px solid var(--border);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ===== СТАТИСТИКА ===== */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin: 0 20px 20px;
  }
  .stat-card {
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 12px 10px;
    text-align: center;
    border: 1px solid var(--border);
  }
  .stat-num {
    font-family: 'Unbounded', sans-serif;
    font-size: 22px;
    font-weight: 700;
    display: block;
    margin-bottom: 4px;
  }
  .stat-label { font-size: 11px; color: var(--text2); }
  .stat-num.orange { color: var(--accent); }
  .stat-num.green { color: var(--green); }
  .stat-num.red { color: var(--red); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">📦 Мои заказы</div>
  </div>
  <div class="header-sub">Яндекс Маркет трекер</div>
</div>

<div class="stats-row">
  <div class="stat-card">
    <span class="stat-num orange" id="stat-active">0</span>
    <div class="stat-label">Активных</div>
  </div>
  <div class="stat-card">
    <span class="stat-num red" id="stat-overdue">0</span>
    <div class="stat-label">Просрочено</div>
  </div>
  <div class="stat-card">
    <span class="stat-num green" id="stat-done">0</span>
    <div class="stat-label">Получено</div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('active')">📦 Активные <span class="tab-count" id="cnt-active">0</span></button>
  <button class="tab" onclick="switchTab('done')">✅ Получены</button>
</div>

<div id="page-active" class="page active"></div>
<div id="page-done" class="page"></div>

<button class="fab" id="fab-btn" onclick="openModal()">+ Добавить заказ</button>

<!-- Модальное окно -->
<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Новый заказ</div>

    <div class="form-group">
      <label class="form-label">🛒 Название товара</label>
      <input class="form-input" id="f-name" placeholder="Например: Наушники Sony WH-1000XM5" type="text">
    </div>

    <div class="form-group">
      <label class="form-label">📧 Email или телефон заказа</label>
      <input class="form-input" id="f-contact" placeholder="ivan@mail.ru или +79991234567" type="text">
    </div>

    <div class="form-group">
      <label class="form-label">📅 Дата прихода</label>
      <input class="form-input" id="f-date" type="date">
    </div>

    <div class="form-group">
      <label class="form-label">🏪 Адрес ПВЗ</label>
      <input class="form-input" id="f-pvz" placeholder="ул. Ленина 5, Яндекс ПВЗ" type="text">
    </div>

    <div class="form-group">
      <label class="form-label">💳 Способ оплаты</label>
      <div class="payment-options">
        <button class="pay-opt selected" onclick="selectPay(this, 'Карта')">💳 Карта</button>
        <button class="pay-opt" onclick="selectPay(this, 'СБП')">📱 СБП</button>
        <button class="pay-opt" onclick="selectPay(this, 'Наличные')">💵 Нал</button>
      </div>
    </div>

    <button class="btn-submit" onclick="addOrder()">Добавить заказ</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ===== ИНИЦИАЛИЗАЦИЯ TELEGRAM =====
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
  }

  // ===== ДАННЫЕ =====
  let orders = JSON.parse(localStorage.getItem('ym_orders') || '[]');
  let selectedPayment = 'Карта';
  let currentTab = 'active';

  function saveOrders() {
    localStorage.setItem('ym_orders', JSON.stringify(orders));
  }

  // ===== РЕНДЕР =====
  function render() {
    const today = new Date();
    today.setHours(0,0,0,0);

    const active = orders.filter(o => o.status === 'active');
    const done = orders.filter(o => o.status === 'done');
    const overdue = active.filter(o => {
      const d = new Date(o.date);
      d.setHours(0,0,0,0);
      return d < today;
    });

    document.getElementById('stat-active').textContent = active.length;
    document.getElementById('stat-overdue').textContent = overdue.length;
    document.getElementById('stat-done').textContent = done.length;
    document.getElementById('cnt-active').textContent = active.length;

    renderList('page-active', active, today);
    renderList('page-done', done, today);
  }

  function renderList(pageId, list, today) {
    const page = document.getElementById(pageId);
    if (list.length === 0) {
      page.innerHTML = `
        <div class="empty-state">
          <span class="empty-icon">${pageId.includes('done') ? '🎉' : '📭'}</span>
          <div class="empty-title">${pageId.includes('done') ? 'Пока пусто' : 'Нет активных заказов'}</div>
          <div class="empty-sub">${pageId.includes('done') ? 'Полученные заказы появятся здесь' : 'Нажми кнопку ниже,\nчтобы добавить первый заказ'}</div>
        </div>`;
      return;
    }

    page.innerHTML = list.map(order => {
      const arrival = new Date(order.date);
      arrival.setHours(0,0,0,0);
      const diff = Math.round((arrival - today) / (1000*60*60*24));

      let statusClass, badgeClass, badgeText;
      if (order.status === 'done') {
        statusClass = 'status-done';
        badgeClass = 'badge-done';
        badgeText = '✅ Получен';
      } else if (diff < 0) {
        statusClass = 'status-overdue';
        badgeClass = 'badge-overdue';
        badgeText = `⚠️ +${Math.abs(diff)} дн.`;
      } else if (diff === 0) {
        statusClass = 'status-today';
        badgeClass = 'badge-today';
        badgeText = '🔔 Сегодня!';
      } else {
        statusClass = 'status-ok';
        badgeClass = 'badge-ok';
        badgeText = `через ${diff} дн.`;
      }

      const dateStr = arrival.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });

      return `
        <div class="order-card ${statusClass}">
          <div class="order-name">${escHtml(order.name)}</div>
          <span class="order-badge ${badgeClass}">${badgeText}</span>
          <div class="order-details">
            <div class="detail-item">
              <div class="detail-label">Дата прихода</div>
              <div class="detail-value">${dateStr}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Оплата</div>
              <div class="detail-value">${escHtml(order.payment)}</div>
            </div>
            <div class="detail-item full">
              <div class="detail-label">ПВЗ</div>
              <div class="detail-value">${escHtml(order.pvz)}</div>
            </div>
            <div class="detail-item full">
              <div class="detail-label">Email / Телефон</div>
              <div class="detail-value">${escHtml(order.contact)}</div>
            </div>
          </div>
          ${order.status === 'active' ? `
          <div class="order-actions">
            <button class="btn btn-complete" onclick="completeOrder('${order.id}')">✅ Забрал!</button>
            <button class="btn btn-delete" onclick="deleteOrder('${order.id}')">🗑</button>
          </div>` : `
          <div class="order-actions">
            <button class="btn btn-delete" onclick="deleteOrder('${order.id}')">🗑 Удалить</button>
          </div>`}
        </div>`;
    }).join('');
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ===== ДЕЙСТВИЯ =====
  function completeOrder(id) {
    const order = orders.find(o => o.id === id);
    if (order) {
      order.status = 'done';
      order.completedAt = new Date().toLocaleDateString('ru-RU');
      saveOrders();
      render();
      showToast('✅ Заказ отмечен как полученный!');
    }
  }

  function deleteOrder(id) {
    if (confirm('Удалить этот заказ?')) {
      orders = orders.filter(o => o.id !== id);
      saveOrders();
      render();
      showToast('🗑 Заказ удалён');
    }
  }

  // ===== МОДАЛЬНОЕ ОКНО =====
  function openModal() {
    document.getElementById('modal').classList.add('open');
    // Сегодняшняя дата по умолчанию
    const today = new Date();
    today.setDate(today.getDate() + 3);
    document.getElementById('f-date').value = today.toISOString().split('T')[0];
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    clearForm();
  }

  function closeModalOutside(e) {
    if (e.target === document.getElementById('modal')) closeModal();
  }

  function clearForm() {
    document.getElementById('f-name').value = '';
    document.getElementById('f-contact').value = '';
    document.getElementById('f-pvz').value = '';
    document.querySelectorAll('.pay-opt').forEach(b => b.classList.remove('selected'));
    document.querySelector('.pay-opt').classList.add('selected');
    selectedPayment = 'Карта';
  }

  function selectPay(btn, val) {
    document.querySelectorAll('.pay-opt').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedPayment = val;
  }

  function addOrder() {
    const name = document.getElementById('f-name').value.trim();
    const contact = document.getElementById('f-contact').value.trim();
    const date = document.getElementById('f-date').value;
    const pvz = document.getElementById('f-pvz').value.trim();

    if (!name || !contact || !date || !pvz) {
      showToast('⚠️ Заполни все поля!');
      return;
    }

    const order = {
      id: Date.now().toString(),
      name, contact, date, pvz,
      payment: selectedPayment,
      status: 'active',
      createdAt: new Date().toLocaleDateString('ru-RU')
    };

    orders.unshift(order);
    saveOrders();
    closeModal();
    render();
    showToast('🎉 Заказ добавлен!');
  }

  // ===== ТАБЫ =====
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.currentTarget.classList.add('active');
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + tab).classList.add('active');
    document.getElementById('fab-btn').classList.toggle('hidden', tab === 'done');
  }

  // ===== ТОСТ =====
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ===== НАПОМИНАНИЯ (через Notifications API) =====
  function checkReminders() {
    const today = new Date();
    today.setHours(0,0,0,0);

    orders.filter(o => o.status === 'active').forEach(order => {
      const arrival = new Date(order.date);
      arrival.setHours(0,0,0,0);
      const diff = Math.round((arrival - today) / (1000*60*60*24));

      if (diff === 0) {
        showToast(`🔔 Сегодня придёт: ${order.name}`);
      } else if (diff < 0) {
        showToast(`⚠️ Просрочен: ${order.name}`);
      }
    });
  }

  // ===== СТАРТ =====
  render();
  setTimeout(checkReminders, 1000);
</script>
</body>
</html>
